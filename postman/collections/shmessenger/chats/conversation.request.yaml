$kind: http-request
name: conversation
url: '{{url}}/chats/conversations'
method: POST
headers:
  - key: X-CSRF-TOKEN
    value: '{{xsrf-token}}'
body:
  type: json
  content: |-
    {
        "creationUserId": 1,
        "conversationName": null,
        "participantIds" : "1,2,2"
    }
order: 1000
