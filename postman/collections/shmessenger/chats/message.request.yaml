$kind: http-request
name: message
url: '{{url}}/chats/messages'
method: POST
headers:
  - key: X-CSRF-TOKEN
    value: '{{xsrf-token}}'
body:
  type: json
  content: |-
    {
        "senderId": 1,
        "conversationId": 1,
        "messageTypeName" : "COMPOSED",
        "content":"sample text"
    }
order: 2000
